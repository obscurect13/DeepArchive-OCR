name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint and Format with Ruff
      run: |
        # Stop the build if there are linting errors. 
        # --diff shows exactly what changes are needed for isort (I001).
        ruff check src/ tests/ api/ utils/ --output-format=github --diff
        # Ensure the code matches the formatting rules in pyproject.toml
        ruff format src/ tests/ api/ utils/ --check

    - name: Type check with mypy
      run: |
        # Removed '|| true' so you actually see if types are breaking, 
        # but kept your requested flag.
        mypy src/ --ignore-missing-imports

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Recommended to add this to your GitHub Secrets
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t deeparchive-ocr:test .

    - name: Test Docker image
      run: |
        docker run --rm deeparchive-ocr:test python -c "import src; print('Import successful')"