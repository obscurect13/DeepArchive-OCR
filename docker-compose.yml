services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deeparchive-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir api --reload-dir src
    ports:
      - "8000:8000"
    volumes:
      - .:/app                  # Live reload during development
      - sqlite-data:/app/data   # Persist SQLite DB
    environment:
      - PYTHONPATH=/app
    networks:
      - deeparchive-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deeparchive-frontend
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - sqlite-data:/app/data   # Same volume so frontend reads the same DB
    environment:
      - PYTHONPATH=/app
      - API_URL=http://api:8000/extract   # Internal Docker network URL
    depends_on:
      - api
    networks:
      - deeparchive-net
    restart: unless-stopped

volumes:
  sqlite-data:

networks:
  deeparchive-net:
    driver: bridge
